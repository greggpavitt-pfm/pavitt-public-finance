        - img "Gregg Pavitt" [ref=e33]
        - generic [ref=e34]:
          - paragraph [ref=e35]: Gregg Pavitt is a public financial management specialist with over 25 years of experience helping governments in Sub-Saharan Africa, South Asia, and the Pacific strengthen how they plan, allocate, and account for public resources.
          - paragraph [ref=e36]: "He provides technical assistance and advisory services in six core areas: PFM studies and assessments, public expenditure management (PEM), domestic revenue mobilisation (DRM), integrated financial management systems (IFMIS), public investment management (PIM), and International Public Sector Accounting Standards (IPSAS)."
          - paragraph [ref=e37]: Gregg has served as Team Leader and Key Expert on programmes funded by the EU (EuropeAid), World Bank, DFAT, USAID, and DFID/FCDO — both in long-term embedded roles within Ministries of Finance and on targeted short-term assignments. He is known for effective policy dialogue with government counterparts, practical reform design, and building national capacity that outlasts the project cycle.
          - paragraph [ref=e38]: International consulting firms and development organisations engage Gregg for his ability to mobilise quickly, manage multi-disciplinary teams, and deliver reliably within the compliance and reporting frameworks that donor-funded programmes demand.
